services:
  - type: web
    name: ahrip-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "flask --app app:create_app db upgrade && gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ENABLE_SCHEDULER
        value: "true"
      - key: ALIENVAULT_OTX_KEY
        sync: false
      - key: URLSCAN_API_KEY
        sync: false
